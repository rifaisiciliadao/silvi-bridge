<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rifai Sicilia DAO | Live Silvi Project Map</title>
    <meta
      name="description"
      content="Explore verified Silvi Protocol project geography, tree records, planting claims, and field evidence from Rifai Sicilia DAO."
    />
    <link rel="canonical" href="https://silvi.rifaisicilia.com/map/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rifai Sicilia DAO" />
    <meta property="og:title" content="Rifai Sicilia DAO | Live Silvi Project Map" />
    <meta
      property="og:description"
      content="Explore verified Silvi Protocol project geography, tree records, planting claims, and field evidence from Rifai Sicilia DAO."
    />
    <meta property="og:url" content="https://silvi.rifaisicilia.com/map/" />
    <meta property="og:image" content="https://silvi.rifaisicilia.com/map/og-image.png" />
    <meta property="og:image:secure_url" content="https://silvi.rifaisicilia.com/map/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Rifai Sicilia DAO live Silvi project map with verified tree and claim counters." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rifai Sicilia DAO | Live Silvi Project Map" />
    <meta
      name="twitter:description"
      content="Explore verified Silvi Protocol project geography, tree records, planting claims, and field evidence from Rifai Sicilia DAO."
    />
    <meta name="twitter:image" content="https://silvi.rifaisicilia.com/map/og-image.png" />
    <meta name="theme-color" content="#0f8a4b" />
    <link rel="icon" href="/map/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/map/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/map/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@700&family=Crimson+Text:ital@0;1&family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="map-shell" aria-label="Silvi live project map">
      <div id="map" class="map-canvas" aria-label="Project geography"></div>
      <div id="mapLoader" class="map-loader" role="status" aria-live="polite">
        <div class="map-loader-card">
          <span class="map-loader-spinner" aria-hidden="true"></span>
          <span id="mapLoaderText">Loading map...</span>
        </div>
      </div>

      <section class="status-panel" aria-live="polite">
        <header class="panel-header">
          <div>
            <p class="eyebrow">Silvi Protocol</p>
            <h1>Rifai Sicilia DAO</h1>
          </div>
          <span id="sourceBadge" class="source-badge">staging</span>
        </header>

        <p id="statusText" class="status-text">Loading Silvi project geography...</p>

        <dl class="stats-grid" aria-label="Silvi map statistics">
          <div class="stat-projects">
            <dt>Projects</dt>
            <dd id="projectCount">-</dd>
          </div>
          <div class="stat-zones">
            <dt>Zones</dt>
            <dd id="zoneCount">-</dd>
          </div>
          <div>
            <dt>Trees</dt>
            <dd id="treeCount">-</dd>
          </div>
          <div class="stat-features">
            <dt>Features</dt>
            <dd id="featureCount">-</dd>
          </div>
        </dl>

        <div class="panel-actions">
          <a id="apiLink" class="geojson-link" href="/api/silvi/map.geojson" target="_blank" rel="noreferrer" aria-label="Open GeoJSON" title="Open GeoJSON">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7l-5-5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
              <path d="M14 2v5h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
              <path d="m10 13-2 2 2 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              <path d="m14 13 2 2-2 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span class="visually-hidden">Open GeoJSON</span>
          </a>
        </div>

        <div id="projectList" class="project-list" aria-label="Silvi projects"></div>
      </section>

      <aside id="detailPanel" class="detail-panel" aria-label="Selected Silvi feature" hidden>
        <header class="detail-header">
          <div>
            <p id="detailKind" class="eyebrow">Feature</p>
            <h2 id="detailTitle">Selected feature</h2>
            <p id="detailSubtitle" class="detail-subtitle"></p>
          </div>
          <div class="detail-header-actions">
            <button id="detailRawButton" class="detail-header-button" type="button" aria-expanded="false" aria-label="Toggle raw data" title="Toggle raw data">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m10 8-4 4 4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <path d="m14 8 4 4-4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <span class="visually-hidden">Toggle raw data</span>
            </button>
            <button id="detailCloseButton" class="detail-header-button" type="button" aria-label="Close details" title="Close details">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <path d="m6 6 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
              <span class="visually-hidden">Close details</span>
            </button>
          </div>
        </header>

        <section id="claimSection" class="detail-section">
          <h3>Claim</h3>
          <dl id="claimList" class="detail-list"></dl>
        </section>

        <section class="detail-section">
          <h3 id="detailFactsTitle">Details</h3>
          <dl id="detailFacts" class="detail-list"></dl>
        </section>

        <section id="mediaSection" class="detail-section">
          <h3>Photos</h3>
          <div id="mediaGrid" class="media-grid"></div>
        </section>

        <section id="rawSection" class="detail-section" hidden>
          <h3>Raw</h3>
          <pre id="detailRaw" class="detail-raw"></pre>
        </section>
      </aside>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="./map.js"></script>
  </body>
</html>
