<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Rifai Sicilia DAO live Silvi project map</title>
  <desc id="desc">OpenGraph preview showing Rifai Sicilia DAO, verified Silvi Protocol geography, tree records, and planting claims.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f8f2"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bfe8ee"/>
      <stop offset="1" stop-color="#8fcbd8"/>
    </linearGradient>
    <pattern id="fieldDots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.1" fill="#0f8a4b" opacity="0.32"/>
      <circle cx="13" cy="12" r="1" fill="#0f8a4b" opacity="0.18"/>
    </pattern>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <filter id="pinShadow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#032516" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#paper)"/>

  <g transform="translate(612 -72) rotate(7)">
